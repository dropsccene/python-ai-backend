services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: bloguser
      POSTGRES_PASSWORD: blogpass
      POSTGRES_DB: blogdb
    ports:
      - "5432:5432"
  app:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://bloguser:blogpass@db:5432/blogdb
      ALEMBIC_AUTO_MIGRATE: "true"
